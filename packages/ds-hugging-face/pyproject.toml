[project]
name = "ds-hugging-face"
version = "0.1.0"
dependencies = [
    "dagster",
    "datasets",
    "ds-storage",
    "huggingface-hub",
    "Jinja2",
    "polars",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ds_hugging_face"]