name: Deploy datasets (self-hosted Dagster)

# Build the user-code image and push it to ECR.

on:
  push:
    branches:
      # main  -> dev environment, prod -> production
      # - main
      - prod
  workflow_dispatch:

concurrency:
  # Cancel in-progress deploys to the same branch
  group: ${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  # main -> dev, anything else (prod) -> prod
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'dev' || 'prod' }}
  IMAGE_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: ${{ github.ref_name == 'main' && 'dev' || 'prod' }}
    permissions:
      contents: read
      id-token: write  # OIDC auth to AWS
    steps:
      - name: Generate token to read submodules
        id: submodules-access-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GPTILT_READONLY_ACCESS_APP_ID }}
          private-key: ${{ secrets.GPTILT_READONLY_ACCESS_APP_PRIVATE_KEY }}
          # Adding 'owner' is required to make the token org-wide
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.submodules-access-token.outputs.token }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build once, tag with the commit SHA (immutable) and the environment (prod/dev).
      - name: Build and push image to ECR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}:${{ env.ENVIRONMENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
