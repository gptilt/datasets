name: Deploy to Dagster Cloud

on:
  push:
    branches:
      # - main
      - prod
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}
  DAGSTER_LOCATION_NAME: "${{ github.repository_owner }}_${{ github.repository }}"
  DAGSTER_PACKAGE_NAME: "orchestration.definitions"  # The python module with the Definitions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository_owner }}/${{ github.repository }}
          push: true
          # We tag the image with the unique Git commit hash (github.sha)
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Dagster Cloud CLI
        run: pip install dagster-cloud

      - name: Update Dagster Cloud Code Location
        env:
          DAGSTER_CLOUD_API_TOKEN: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
        run: |
          dagster-cloud workspace add-location \
            --location-name ${{ env.DAGSTER_LOCATION_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --package-name ${{ env.DAGSTER_PACKAGE_NAME }} \
            --url ${{ secrets.DAGSTER_CLOUD_URL }}